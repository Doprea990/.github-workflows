<!DOCTYPE html>
<html lang="es">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Camara de Fotos</title>
        <style>
        
        body {
            font-family: Arial, sans-serif;
            background-color: white;
            padding: 20px;
        }
        input[type="text"],
        input[type="numbre"],
        select {
            width: 100%;
            padding: 10px;
            margin: 10px 0;
            border: 1px solid white;
            border-radius: 4px;
        }
        input[type="submit"] {
        background-color: green;
        color: white;
        border: none;
        padding: 10px;
        cursor: pointer;
        border-radius: 4px;
        }
        input[type="submit"]:hover {
            background-color: green;
        }
        </style>
        </head>
        <body>

            <h2> Camara de fotos</h2>
            <form action="/camara-fotos" method="get">
                <label for="marca">Marca:</label>
                <input type="text" id="marca" name="marca" placeholder="EJ. Sony, Leica, Canon">

                <label for="tipo">Tipo Camara:</label>
                <select type="tipo" id="tipo">
                <option value="">-- Selecciona tipo de camara --</option>
                <option value="reflex">Camara reflex</option>
                <option value="bridge">Camaras bridge</option>
                </select>

                <label for="precio_min">Precio Minimo:</label>
                <input type="number" id="precio_min" name="precio_min" placeholder="100">

                <label for="precio_max">Precio Maximo:</label>
                <input type="number" id="precio_max" name="precio_max" placeholder="2000">
                
                <label for="resolucion">Resolucion (en megapixeles):</label>
                <input type="number" id="resolucion" name="resolucion" placeholder="10MP">
                
                <label for="caracteristicas">caracteristicas</label>
                <input type="text" id="caracteristicas" name="caracteristicas" placeholder="4k, 2k, Objetivo">

                <input type="submit" value="Buscar Camara">
                </form>
</body>
</html>
